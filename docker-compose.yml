services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradermonkeys
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/tradermonkeys
      APP_ENV: ${APP_ENV:-development}
      T212_API_KEY: ${T212_API_KEY}
      T212_API_SECRET: ${T212_API_SECRET}
      T212_BASE_URL: ${T212_BASE_URL:-https://demo.trading212.com}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      SCHEDULER_USER_ID: ${SCHEDULER_USER_ID:-scheduler}
      SCHEDULER_NEWS_INTERVAL_MINUTES: ${SCHEDULER_NEWS_INTERVAL_MINUTES:-60}
      SCHEDULER_SIGNALS_TIME: ${SCHEDULER_SIGNALS_TIME:-09:30}
      SCHEDULER_SIGNALS_TIMEZONE: ${SCHEDULER_SIGNALS_TIMEZONE:-US/Eastern}
      SCHEDULER_DEFAULT_WATCHLIST: ${SCHEDULER_DEFAULT_WATCHLIST:-AAPL,MSFT,AMZN,GOOGL,META,TSLA,NVDA,AMD,INTC,NFLX,CRM,BABA,JPM,V,MA,DIS}
      RESEARCH_DEFAULT_BUDGET: ${RESEARCH_DEFAULT_BUDGET:-1000.0}
      RESEARCH_DEFAULT_CURRENCY: ${RESEARCH_DEFAULT_CURRENCY:-EUR}
      RESEARCH_DEFAULT_RISK_PROFILE: ${RESEARCH_DEFAULT_RISK_PROFILE:-moderate}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-noreply@tradermonkeys.app}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ENABLE_EMAIL_DIGEST: ${ENABLE_EMAIL_DIGEST:-false}
      SIGNAL_PROMPT_OVERRIDE_PATH: ${SIGNAL_PROMPT_OVERRIDE_PATH:-}
      RESEARCH_PROMPT_OVERRIDE_PATH: ${RESEARCH_PROMPT_OVERRIDE_PATH:-}
    depends_on:
      - db
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
